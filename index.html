<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Droid Readiness Auditor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border2: #3a3a3a;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --green: #00e676;
    --green-dim: #1a3d2b;
    --amber: #ffb300;
    --amber-dim: #3d2e00;
    --red: #ff5252;
    --red-dim: #3d1414;
    --accent: #00e676;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0;
  }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 4rem 2rem 6rem;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--green);
    border: 1px solid rgba(0,230,118,0.3);
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  h1 {
    font-size: 38px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 0.75rem;
    color: var(--text);
  }
  h1 span { color: var(--green); font-weight: 500; }

  .subtitle {
    font-size: 15px;
    color: var(--text2);
    margin-bottom: 3rem;
    max-width: 480px;
  }

  .input-wrap {
    display: flex;
    gap: 0;
    margin-bottom: 3rem;
    border: 1px solid var(--border2);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: var(--green); }

  .input-prefix {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text3);
    background: var(--surface);
    padding: 0 14px;
    display: flex; align-items: center;
    border-right: 1px solid var(--border);
    white-space: nowrap;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 14px 16px;
  }
  input::placeholder { color: var(--text3); }

  button#auditBtn {
    background: var(--green);
    color: #000;
    border: none;
    padding: 14px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  button#auditBtn:hover { opacity: 0.85; }
  button#auditBtn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 2rem;
    display: none;
  }
  .status.error { color: var(--red); }

  .results { display: none; }

  .repo-meta {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .repo-meta .repo-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .repo-meta .repo-desc {
    font-size: 13px;
    color: var(--text2);
    margin-top: 2px;
  }

  .verdict-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .overall-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .overall-num {
    font-size: 64px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .overall-label {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }
  .overall-label strong { display: block; color: var(--text); font-size: 15px; font-weight: 400; }

  .dim-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 2.5rem;
  }
  @media (max-width: 500px) { .dim-grid { grid-template-columns: 1fr; } }

  .dim-cell {
    background: var(--surface);
    padding: 1.25rem 1.25rem 1rem;
  }
  .dim-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
    font-family: 'IBM Plex Mono', monospace;
  }
  .dim-score {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .dim-bar {
    height: 2px;
    background: var(--border2);
    border-radius: 1px;
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
  }

  .recs-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 1rem;
  }

  .rec {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .rec-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .rec-body .rec-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }
  .rec-body .rec-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  .powered {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-top: 3rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .powered::before { content: '//'; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
  <div class="badge">factory.ai · droid onboarding tool</div>
  <h1>Droid <span>readiness</span><br>auditor</h1>
  <p class="subtitle">Analyzes any public GitHub repo and scores how prepared it is for Factory Droid onboarding — across docs, tests, CI/CD, architecture, and dependency clarity.</p>

  <div class="input-wrap">
    <span class="input-prefix">github.com/</span>
    <input type="text" id="repoInput" placeholder="owner/repo" />
    <button id="auditBtn" onclick="runAudit()">Run audit</button>
  </div>

  <div class="status" id="statusMsg"></div>
  <div class="results" id="results"></div>

  <div class="powered">built with Claude API · for Factory</div>
</div>

<script>
const ANTHROPIC_API_KEY_VAL = '';

function parseRepo(input) {
  input = input.trim()
    .replace(/^https?:\/\//, '')
    .replace(/^github\.com\//, '')
    .replace(/\.git$/, '');
  const parts = input.split('/');
  if (parts.length >= 2) return { owner: parts[0], repo: parts[1] };
  return null;
}

async function fetchGH(path) {
  const res = await fetch('https://api.github.com/' + path, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error('GitHub returned ' + res.status + ' — is the repo public?');
  return res.json();
}

function scoreColor(n) {
  if (n >= 75) return 'var(--green)';
  if (n >= 45) return 'var(--amber)';
  return 'var(--red)';
}

function verdictStyle(v) {
  if (v === 'Droid-ready') return 'background:var(--green-dim);color:var(--green);';
  if (v === 'Almost ready') return 'background:#1a3300;color:#8bc34a;';
  if (v === 'Needs work') return 'background:var(--amber-dim);color:var(--amber);';
  return 'background:var(--red-dim);color:var(--red);';
}

function tagStyle(p) {
  if (p === 'critical') return 'background:var(--red-dim);color:var(--red);';
  if (p === 'high') return 'background:var(--amber-dim);color:var(--amber);';
  return 'background:var(--green-dim);color:var(--green);';
}

async function runAudit() {
  const raw = document.getElementById('repoInput').value;
  const parsed = parseRepo(raw);
  const btn = document.getElementById('auditBtn');
  const statusEl = document.getElementById('statusMsg');
  const resultsEl = document.getElementById('results');

  if (!parsed) {
    statusEl.className = 'status error';
    statusEl.style.display = 'block';
    statusEl.textContent = '// error: enter a valid repo (owner/repo)';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Fetching...';
  statusEl.className = 'status';
  statusEl.style.display = 'block';
  resultsEl.style.display = 'none';

  try {
    statusEl.textContent = '// fetching repo data from GitHub...';
    const { owner, repo } = parsed;

    const [repoData, contents] = await Promise.all([
      fetchGH('repos/' + owner + '/' + repo),
      fetchGH('repos/' + owner + '/' + repo + '/contents').catch(() => [])
    ]);

    const fileNames = Array.isArray(contents) ? contents.map(f => f.name.toLowerCase()) : [];

    let readmeContent = '';
    const readmeFile = Array.isArray(contents) && contents.find(f => f.name.toLowerCase().startsWith('readme'));
    if (readmeFile && readmeFile.download_url) {
      try {
        const r = await fetch(readmeFile.download_url);
        readmeContent = await r.text();
      } catch(e) {}
    }

    statusEl.textContent = '// analyzing with Claude...';

    const context = `
Repository: ${repoData.full_name}
Description: ${repoData.description || 'none'}
Primary language: ${repoData.language || 'unknown'}
Stars: ${repoData.stargazers_count}, Forks: ${repoData.forks_count}
Open issues: ${repoData.open_issues_count}
Has wiki: ${repoData.has_wiki}
Root files: ${fileNames.join(', ')}
README (first 2000 chars): ${readmeContent.slice(0, 2000)}
    `.trim();

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_API_KEY_VAL, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are an expert evaluating GitHub repos for Factory Droid onboarding readiness. Factory's Droids are autonomous AI software engineering agents that onboard like human engineers — they need good README, test coverage, CI/CD, architecture docs, and dependency clarity. Factory's philosophy is "paving the roads": agents only work well when the infrastructure is solid. Score 5 dimensions 0-100 and give specific actionable recommendations. Return ONLY valid JSON, no markdown, no preamble.`,
        messages: [{
          role: 'user',
          content: `Analyze this repo and return ONLY this JSON structure:
{
  "scores": { "readme": 0-100, "tests": 0-100, "cicd": 0-100, "architecture": 0-100, "dependencies": 0-100 },
  "overall": 0-100,
  "verdict": "Not ready" | "Needs work" | "Almost ready" | "Droid-ready",
  "recommendations": [
    { "priority": "critical"|"high"|"medium", "title": "short title", "description": "specific actionable description" }
  ]
}

Repo data:
${context}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const audit = JSON.parse(clean);

    renderResults(repoData, audit);
    statusEl.style.display = 'none';
    resultsEl.style.display = 'block';

  } catch(e) {
    statusEl.className = 'status error';
    statusEl.textContent = '// error: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Run audit';
  }
}

function renderResults(repoData, audit) {
  const dims = [
    { key: 'readme', label: 'README quality' },
    { key: 'tests', label: 'Test coverage' },
    { key: 'cicd', label: 'CI/CD setup' },
    { key: 'architecture', label: 'Architecture docs' },
    { key: 'dependencies', label: 'Dependency clarity' }
  ];

  const dimCells = dims.map(d => {
    const val = audit.scores[d.key] || 0;
    return `<div class="dim-cell">
      <div class="dim-label">${d.label}</div>
      <div class="dim-score" style="color:${scoreColor(val)}">${val}<span style="font-size:16px;color:var(--text3)">/100</span></div>
      <div class="dim-bar"><div class="dim-bar-fill" style="width:${val}%;background:${scoreColor(val)};"></div></div>
    </div>`;
  }).join('');

  const recs = (audit.recommendations || []).map(r => `
    <div class="rec">
      <span class="rec-tag" style="${tagStyle(r.priority)}">${r.priority}</span>
      <div class="rec-body">
        <div class="rec-title">${r.title}</div>
        <div class="rec-desc">${r.description}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('results').innerHTML = `
    <div class="repo-meta">
      <div>
        <div class="repo-name">${repoData.full_name}</div>
        <div class="repo-desc">${repoData.description || 'no description'} &nbsp;·&nbsp; ${repoData.language || '?'} &nbsp;·&nbsp; ${repoData.stargazers_count.toLocaleString()} stars</div>
      </div>
      <div class="verdict-pill" style="${verdictStyle(audit.verdict)}">${audit.verdict}</div>
    </div>
    <div class="overall-row">
      <div class="overall-num" style="color:${scoreColor(audit.overall)}">${audit.overall}</div>
      <div class="overall-label"><strong>Overall droid readiness</strong>out of 100</div>
    </div>
    <div class="dim-grid">${dimCells}</div>
    <div class="recs-title">// recommendations</div>
    ${recs}
  `;
}

document.getElementById('repoInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runAudit();
});
</script>
</body>
</html>
